version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zapoferta-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change_refresh_in_production}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - DB_PATH=/app/data/zapoferta.db
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=zapofertas123
      - EVOLUTION_INSTANCE=zapofertas
    volumes:
      - ./data:/app/data
      - ./sessions:/app/data/sessions
    shm_size: '256m'
    depends_on:
      - evolution-api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zapoferta-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:3001/api

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution_db?schema=evolution_api
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_exchange
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - AUTHENTICATION_API_KEY=zapofertas123
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      - LOG_BAILEYS=error
    depends_on:
      - postgres
      - redis
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - default

  postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=evolution_db
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

  redis:
    image: redis:latest
    container_name: evolution_redis
    restart: unless-stopped
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - default

volumes:
  data:
  sessions:
  evolution_instances:
  evolution_redis:
  postgres_data:
